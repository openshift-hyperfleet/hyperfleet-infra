# Simple valid HyperFleet Adapter Configuration for testing

# Parameters with all required variables
params:
  - name: "clusterId"
    source: "event.id"
    type: "string"
    required: true

# Preconditions with valid operators and CEL expressions
preconditions:
  - name: "clusterStatus"
    api_call:
      method: "GET"
      url: "/clusters/{{ .clusterId }}"
      timeout: 10s
      retry_attempts: 3
      retry_backoff: "exponential"
    capture:
      - name: "clusterName"
        field: "name"
      - name: "generationSpec"
        field: "generation"
      - name: "is_deleting"
        expression: "has(clusterStatus.deleted_time)"
      - name: "clusterNotReconciled"
        expression: |
          status.conditions.filter(c, c.type == "Reconciled").size() > 0
            ? status.conditions.filter(c, c.type == "Reconciled")[0].status != "True"
            : true
      - name: "clusterReconciledTTL"
        expression: |
          (timestamp(now()) - timestamp(
            status.conditions.filter(c, c.type == "Reconciled").size() > 0
              ? status.conditions.filter(c, c.type == "Reconciled")[0].last_transition_time
              : now()
          )).getSeconds() > 300

  - name: "clusterAdapterStatus"
    api_call:
      method: "GET"
      url: "/clusters/{{ .clusterId }}/statuses"
      timeout: 10s
      retry_attempts: 3
      retry_backoff: "exponential"
    capture:
      - name: "clusterJobStatus"
        field: "{.items[?(@.adapter=='cl-job')].conditions[?(@.type=='Available')].status}"

  - name: "validationCheck"
    expression: |
      is_deleting || (clusterJobStatus == "True" && (clusterNotReconciled || clusterReconciledTTL))

# Resources with valid K8s manifests
resources:
  - name: "testDeployment"
    transport:
      client: "kubernetes"
    manifest:
      ref: "/etc/adapter/deployment.yaml"
    discovery:
      namespace: "{{ .clusterId }}"
      by_selectors:
        label_selector:
          hyperfleet.io/resource-type: "deployment"
          hyperfleet.io/cluster-id: "{{ .clusterId }}"
    lifecycle:
      delete:
        propagationPolicy: Background
        when:
          expression: "is_deleting"

# Post-processing with valid CEL expressions
post:
  payloads:
    - name: "clusterStatusPayload"
      build:
        adapter: "{{ .adapter.name }}"
        conditions:
          # Applied: Deployment successfully created
          - type: "Applied"
            status:
              expression: |
                has(resources.testDeployment) ? "True" : "False"
            reason:
              expression: |
                has(resources.testDeployment)
                  ? "DeploymentApplied"
                  : "DeploymentPending"
            message:
              expression: |
                has(resources.testDeployment)
                  ? "testDeployment manifest applied successfully"
                  : "testDeployment is pending to be applied"
          # Available: Check deployment status conditions
          - type: "Available"
            status:
              expression: |
                has(resources.testDeployment) ?
                 ( resources.?testDeployment.?status.?conditions.orValue([]).exists(c, c.type == "Available")
                  ? resources.testDeployment.status.conditions.filter(c, c.type == "Available")[0].status : "False")
                 : "False"
            reason:
              expression: |
                resources.?testDeployment.?status.?conditions.orValue([]).exists(c, c.type == "Available")
                  ? resources.testDeployment.status.conditions.filter(c, c.type == "Available")[0].reason
                  : resources.?testDeployment.?status.?conditions.orValue([]).exists(c, c.type == "Progressing" && c.status == "False") ? "DeploymentFailed"
                       : resources.?testDeployment.?status.hasValue() ? "DeploymentInProgress" : "DeploymentPending"
            message:
              expression: |
                resources.?testDeployment.?status.?conditions.orValue([]).exists(c, c.type == "Available")
                  ? resources.testDeployment.status.conditions.filter(c, c.type == "Available")[0].message
                  : resources.?testDeployment.?status.?conditions.orValue([]).exists(c, c.type == "Progressing" && c.status == "False") ? "Deployment failed"
                       : resources.?testDeployment.?status.hasValue() ? "Deployment in progress" : "Deployment is pending"
          # Health: Adapter execution status (runtime)
          - type: "Health"
            status:
              expression: |
                adapter.?executionStatus.orValue("") == "success"
                  && !adapter.?resourcesSkipped.orValue(false)
                ? "True"
                : "False"
            reason:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                ? "ExecutionFailed:" + adapter.?executionError.?phase.orValue("unknown")
                : adapter.?resourcesSkipped.orValue(false)
                  ? "ResourcesSkipped"
                  : "Healthy"
            message:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                ? "Adapter failed at phase ["
                    + adapter.?executionError.?phase.orValue("unknown")
                    + "] step ["
                    + adapter.?executionError.?step.orValue("unknown")
                    + "]: "
                    + adapter.?executionError.?message.orValue(adapter.?errorMessage.orValue("no details"))
                : adapter.?resourcesSkipped.orValue(false)
                  ? "Resources skipped: " + adapter.?skipReason.orValue("unknown reason")
                  : "Adapter execution completed successfully"
          # Finalized: True once deployment is confirmed deleted
          - type: "Finalized"
            status:
              expression: |
                is_deleting
                  && adapter.?executionStatus.orValue("") == "success"
                  && !adapter.?resourcesSkipped.orValue(false)
                  && !resources.?testDeployment.hasValue()
                ? "True"
                : "False"
            reason:
              expression: |
                !is_deleting ? "NotDeleting"
                : !resources.?testDeployment.hasValue()
                  ? "CleanupConfirmed"
                  : "CleanupInProgress"
            message:
              expression: |
                !is_deleting ? "Resource not marked for deletion"
                : !resources.?testDeployment.hasValue()
                  ? "All resources deleted; cleanup confirmed"
                  : "Deletion in progress; waiting for deployment to be removed"
        # Event generation ID metadata field needs to use expression to avoid interpolation issues
        observed_generation:
          expression: "generationSpec"
        observed_time: '{{ now | date "2006-01-02T15:04:05Z07:00" }}'

  post_actions:
    - name: "reportClusterStatus"
      api_call:
        method: "PUT"
        url: "/clusters/{{ .clusterId }}/statuses"
        headers:
          - name: "Content-Type"
            value: "application/json"
        body: "{{ .clusterStatusPayload }}"
