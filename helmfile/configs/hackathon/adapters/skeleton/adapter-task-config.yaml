# ─── 4. POST (STATUS REPORTING) ──────────────────────────────────────────────
# Report your adapter's status back to the HyperFleet API.
#
# Every adapter MUST report four conditions:
#   Applied   — have the K8s resources been created?
#   Available — has the work completed successfully?
#   Health    — is the adapter operating normally?
#   Finalized — (for deletion) are all resources confirmed deleted?
#
# Each condition has:
#   status  — CEL expression → "True", "False", or "Unknown"
#   reason  — CEL expression → machine-readable reason string
#   message — CEL expression → human-readable message
#
# Access resource state via:  resources.?resourceName.?field.hasValue()
# Access adapter state via:   adapter.?executionStatus.orValue("")
#
# The status payload is sent via POST/PUT to /<resource_type>/<id>/statuses
#
# TODO: Build your status payload and post it to the API.

