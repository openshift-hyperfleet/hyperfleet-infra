  #     url: ""            # TODO: API endpoint, e.g., "/clusters/{{ .clusterId }}"
  #     timeout: 10s
  #     retry_attempts: 3
  #     retry_backoff: "exponential"
  #   capture: []
  #     # TODO: Extract fields from the API response
  #     # - name: "resourceName"
  #     #   field: "name"
  #     # - name: "is_deleting"
  #     #   expression: "<CEL expression>"
  #
  # - name: "shouldProceed"
  #   expression: ""       # TODO: CEL expression combining your conditions

# ─── 3. RESOURCES ─────────────────────────────────────────────────────────────
# Define the Kubernetes resources your adapter creates and manages.
#
# Each resource has:
#   transport  — how to apply it (client: "kubernetes" for direct K8s API)
#   manifest   — the K8s resource manifest (Go template syntax for variables)
#   discovery  — how to find existing instances of this resource
#   lifecycle  — deletion behavior (propagationPolicy, when to delete)
#
# Go template variables: {{ .paramName }} references params defined above
# Common resource types: ConfigMap, Job, Deployment, Namespace
#
# TODO: Define the Kubernetes resources your adapter creates.

