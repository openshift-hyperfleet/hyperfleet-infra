# HyperFleet Ignition Day — Adapter Task Configuration (Skeleton)
#
# This is where the real work happens. Your adapter task config defines:
#   1. params      — values extracted from the incoming broker event
#   2. preconditions — when should your adapter act? (CEL expressions + API calls)
#   3. resources   — what Kubernetes resources does your adapter create/manage?
#   4. post        — how does your adapter report status back to the API?
#
# Architecture docs:
#   Adapter framework: https://github.com/openshift-hyperfleet/architecture/blob/main/hyperfleet/components/adapter/framework/adapter-frame-design.md
#   CEL expressions:   https://github.com/google/cel-spec
#   Go templates:      https://pkg.go.dev/text/template
#
# Write your config from the architecture docs. Do not copy from existing adapters.

# ─── 1. PARAMS ────────────────────────────────────────────────────────────────
# Extract values from the incoming broker event for use in later sections.
#
# Each param has:
#   name     — variable name (referenced as {{ .paramName }} in templates)
#   source   — where to read from: "event.<field>" or "env.<VAR>"
#   type     — "string" or "int"
#   required — if true, adapter won't run without this value
#
# The event payload contains at minimum: id, generation, resource_type
#
# TODO: Define the parameters your adapter needs from the event.

params: []
  # - name: ""
  #   source: ""
  #   type: "string"
  #   required: true

# ─── 2. PRECONDITIONS ─────────────────────────────────────────────────────────
# Decide whether your adapter should act on this event.
#
# Typical pattern:
#   Step 1: Make an API call to GET the resource's current state
#   Step 2: Capture fields from the response into named variables
#   Step 3: Write CEL expressions that evaluate to true/false
#   Step 4: Combine into a final validation expression
#
# Key concepts:
#   - api_call: fetch data from the HyperFleet API (GET /clusters/{id}, etc.)
#   - capture: extract fields from the API response into variables
#   - expression: CEL expression that must evaluate to true for the adapter to proceed
#   - The "Reconciled" condition indicates a resource has been fully processed
#   - Check for deletion via: has(resource.deleted_time) or resource.?deleted_time.hasValue()
#
# TODO: Define when your adapter should act.

preconditions: []
  # - name: "fetchResourceState"
  #   api_call:
