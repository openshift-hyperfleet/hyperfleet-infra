# Hackathon — Cluster 1: "Dog Food" (Healthy deployment)
# Standard sentinel pair: one for clusters, one for nodepools
sentinels:
  - name: clusters
    values:
      - config:
          resourceType: clusters
      - broker:
          type: rabbitmq
          topic: hyperfleet-healthy-clusters
          rabbitmq:
            url: "amqp://guest:guest@rabbitmq:5672"
            exchangeType: topic

  - name: nodepools
    values:
      - config:
          resourceType: nodepools
          messageData:
            owner_references:
              id: "resource.owner_references.id"
              href: "resource.owner_references.href"
              kind: "resource.owner_references.kind"
      - broker:
          type: rabbitmq
          topic: hyperfleet-healthy-nodepools
          rabbitmq:
            url: "amqp://guest:guest@rabbitmq:5672"
            exchangeType: topic
