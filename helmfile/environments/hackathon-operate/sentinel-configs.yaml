# Hackathon — Cluster 3: "Operate" (Scenario 5: Shard the Sentinel)
#
# Single catch-all sentinel for clusters (no resource selector).
# Participants will scale this down and deploy their own region-specific sentinels
# using the skeleton config at: helmfile/configs/hackathon/sentinels/skeleton/
#
# The nodepools sentinel is standard and NOT sharded in this scenario.
sentinels:
  - name: clusters
    values:
      - config:
          resourceType: clusters
          # Catch-all: no resourceSelector means "watch everything"
          resourceSelector: []
      - broker:
          type: rabbitmq
          topic: hyperfleet-clusters
          rabbitmq:
            url: "amqp://guest:guest@rabbitmq:5672"
            exchangeType: topic

  - name: nodepools
    values:
      - config:
          resourceType: nodepools
          messageData:
            owner_references:
              id: "resource.owner_references.id"
              href: "resource.owner_references.href"
              kind: "resource.owner_references.kind"
      - broker:
          type: rabbitmq
          topic: hyperfleet-nodepools
          rabbitmq:
            url: "amqp://guest:guest@rabbitmq:5672"
            exchangeType: topic
