# Hackathon — Cluster 1: "Dog Food" (Broken deployment)
# Standard sentinel pair — sentinels are not broken, only adapter3 is
sentinels:
  - name: clusters
    values:
      - config:
          resourceType: clusters
      - broker:
          type: rabbitmq
          topic: hyperfleet-broken-clusters
          rabbitmq:
            url: "amqp://guest:guest@rabbitmq:5672"
            exchangeType: topic

  - name: nodepools
    values:
      - config:
          resourceType: nodepools
          messageData:
            owner_references:
              id: "resource.owner_references.id"
              href: "resource.owner_references.href"
              kind: "resource.owner_references.kind"
      - broker:
          type: rabbitmq
          topic: hyperfleet-broken-nodepools
          rabbitmq:
            url: "amqp://guest:guest@rabbitmq:5672"
            exchangeType: topic
